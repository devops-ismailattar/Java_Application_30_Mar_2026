name: java application cicd
on:
  push:
    branches: ["main"]
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2

      - run: echo "cicd intiated"
      
      - name: setup java jdk
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: build with maven
        run: mvn -B clean package

      - name: sonarqube scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: sonarqube qwality gate check
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


      - name: upload build artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-artifact
          path: ./target/*.jar

  build_and_push_docker_image:
    runs-on: ubuntu-latest
    permission: 
      id_token: write
      contents: read
    needs: build
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2

      - name: download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-artifact
          path: ./target/

      - name: configure aws credential
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: ap-south-1
          role-to-assume: arn:aws:iam::076226033208:role/github-actions-ecr-role

      - name: login to ecr
        uses: docker/login-action@v4
        with:
          registry: 076226033208.dkr.ecr.ap-south-1.amazonaws.com

      - name: build and push docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: 076226033208.dkr.ecr.ap-south-1.amazonaws.com/java-app:${{github.sha}}

  update-deployment-files:
    needs: build_and_push_docker_image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}

      - name: update the deployment file
        run: |
          git config user.name ismail
          git config user.email ismailattar@gmail.com
          sed -i "s|image:.*|image: 076226033208.dkr.ecr.ap-south-1.amazonaws.com/springboot-java-app:${{ github.sha }}|" app-manifest/deployment.yml
          git add app-manifest/deployment.yml
          git commit -m " updated deployment files to ${{ github.sha }} "
          git push origin main
          git fetch origin
          git checkout argocd
          sed -i "s|image:.*|image: 076226033208.dkr.ecr.ap-south-1.amazonaws.com/springboot-java-app:${{ github.sha }}|" app-manifest/deployment.yml
          git add app-manifest/deployment.yml
          git commit -m " updated deployment files to ${{ github.sha }} "
          git push origin argocd
