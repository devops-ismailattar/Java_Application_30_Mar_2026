<!DOCTYPE html>
<html>
<head>
    <title>Colorful App</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            text-align: center;
            color: white;
        }

        .card {
            background: white;
            color: black;
            margin: 100px auto;
            padding: 30px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        button {
            background: #5b86e5;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #36d1dc;
        }
    </style>
</head>
<body>

<h1>🚀 My Java Website</h1>

<div class="card">
    <h2>Hello!</h2>
    <p>This is your colorful app 🎉</p>
    <button onclick="alert('Working!')">Click Me</button>
</div>

</body>
</html>
